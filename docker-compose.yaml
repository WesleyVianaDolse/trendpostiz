services:
  postiz:
    image: ghcr.io/wesleyvianadolse/postiz-app:latest
    container_name: postiz
    restart: always

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.postiz.rule=Host(`postiz.trendbyte.com.br`)"
      - "traefik.http.routers.postiz.entrypoints=websecure"
      - "traefik.http.routers.postiz.tls=true"
      - "traefik.http.routers.postiz.tls.certresolver=letsencrypt"
      - "traefik.http.routers.postiz-http.rule=Host(`postiz.trendbyte.com.br`)"
      - "traefik.http.routers.postiz-http.entrypoints=web"
      - "traefik.http.routers.postiz-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.services.postiz.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik"

    environment:
      MAIN_URL: "https://${DOMAIN}"
      FRONTEND_URL: "https://${DOMAIN}"
      NEXT_PUBLIC_BACKEND_URL: "https://${DOMAIN}/api"
      JWT_SECRET: "${JWT_SECRET}"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postiz-postgres:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://postiz-redis:6379"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      TEMPORAL_ADDRESS: "postiz-temporal:7233"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"



      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"

      CLOUDFLARE_ACCOUNT_ID: ""
      CLOUDFLARE_ACCESS_KEY: ""
      CLOUDFLARE_SECRET_ACCESS_KEY: ""
      CLOUDFLARE_BUCKETNAME: ""
      CLOUDFLARE_BUCKET_URL: ""
      CLOUDFLARE_REGION: "auto"



      OPENAI_API_KEY: ""
      NEXT_PUBLIC_DISCORD_SUPPORT: ""
      NEXT_PUBLIC_POLOTNO: ""
      API_LIMIT: 30

      FEE_AMOUNT: 0.05
      STRIPE_PUBLISHABLE_KEY: ""
      STRIPE_SECRET_KEY: ""
      STRIPE_SIGNING_KEY: ""
      STRIPE_SIGNING_KEY_CONNECT: ""

      NX_ADD_PLUGINS: false

    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/

    networks:
      - postiz-network
      - traefik

    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      postiz-temporal:
        condition: service_started

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 3

  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  postiz-temporal-postgres:
    image: postgres:16-alpine
    container_name: postiz-temporal-postgres
    restart: always
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 10

  postiz-temporal:
    image: temporalio/auto-setup:1.28.2
    container_name: postiz-temporal
    restart: always
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postiz-temporal-postgres
      SKIP_ADD_CUSTOM_SEARCH_ATTRIBUTES: "true"
    networks:
      - postiz-network
    depends_on:
      postiz-temporal-postgres:
        condition: service_healthy

  postiz-temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: postiz-temporal-ui
    restart: always
    environment:
      TEMPORAL_ADDRESS: postiz-temporal:7233
      TEMPORAL_CORS_ORIGINS: "https://${DOMAIN}"
    networks:
      - postiz-network
    depends_on:
      - postiz-temporal

volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-postgres-volume:

networks:
  postiz-network:
  traefik:
    external: true
